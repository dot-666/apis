            </div>

    <script src="/script.js"></script>    
    <script src="/tkm.js"></script>    
    <script>
        const changeLog = [
            { version: "1.0.5", date: "2025-10-18", changes: ["Replaced dead Ai endpoints","Added base 64 converter","Updated Npm Packages"] },
            { version: "1.0.4", date: "2025-07-23", changes: ["Added support for additional fonts and color schemes","Improved error handling for missing parameters"] },
            { version: "1.0.3", date: "2025-06-01", changes: ["Added new API endpoint for generating book-style images"] },
            { version: "1.0.2", date: "2025-05-11", changes: ["Fixed issue with error handling on missing parameters"] },
            { version: "1.0.1", date: "2025-05-10", changes: ["Initial public release of TKM-API"] }
        ];
        const container = document.getElementById('change-log');
        container.innerHTML = changeLog.map((entry, index) => `
            <div class="bg-gray-50 border border-gray-100 rounded-xl">
                <button class="w-full flex justify-between items-center px-4 py-3 focus:outline-none focus:ring hover:bg-gray-100" onclick="toggleChangeLog(${index})">
                    <span class="font-medium text-gray-800">v${entry.version} - ${entry.date}</span>
                    <span id="toggle-icon-${index}" class="material-icons text-gray-500">expand_more</span>
                </button>
                <div id="changes-${index}" class="px-4 pb-3 hidden">
                    <ul class="list-disc ml-5 mt-2 space-y-1">
                        ${entry.changes.map(change => `<li>${change}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `).join('');
        function toggleChangeLog(index) {
            const changesDiv = document.getElementById(`changes-${index}`);
            const icon = document.getElementById(`toggle-icon-${index}`);
            if (changesDiv.classList.contains('hidden')) {
                changesDiv.classList.remove('hidden');
                icon.textContent = 'expand_less';
            } else {
                changesDiv.classList.add('hidden');
                icon.textContent = 'expand_more';
            }
        }
    </script>
