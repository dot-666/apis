                </div>

    <script src="/script.js"></script>    
    <script src="/tkm.js"></script>    
    <script>
        const changeLog = [
            {
                version: "1.1.0",
                date: "2026-07-02",
                changes: [
                    "Rebranded to Supreme Media APIs by supreme (vinpink2)",
                    "Removed Education and Image Search endpoints",
                    "Fixed TikTok downloader — switched to GET endpoint, fixed rate-limit crash, added HD link, music info, author & stats",
                    "Updated all GitHub links to github.com/vinpink2",
                    "Cleaned up unused dependencies for faster install",
                    "Removed AI endpoints (pending reliable free providers)"
                ]
            },
            {
                version: "1.0.5",
                date: "2025-10-18",
                changes: [
                    "Replaced dead AI endpoints",
                    "Added base64 converter",
                    "Updated npm packages"
                ]
            },
            {
                version: "1.0.4",
                date: "2025-07-23",
                changes: [
                    "Added support for additional fonts and color schemes",
                    "Improved error handling for missing parameters"
                ]
            },
            {
                version: "1.0.3",
                date: "2025-06-01",
                changes: [
                    "Added new API endpoint for generating book-style images"
                ]
            },
            {
                version: "1.0.2",
                date: "2025-05-11",
                changes: [
                    "Fixed issue with error handling on missing parameters"
                ]
            },
            {
                version: "1.0.1",
                date: "2025-05-10",
                changes: [
                    "Initial public release"
                ]
            }
        ];

        const container = document.getElementById('change-log');
        container.innerHTML = changeLog.map((entry, index) => `
            <div style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; overflow:hidden;">
                <button class="w-full flex justify-between items-center px-4 py-3 focus:outline-none transition-colors"
                        style="color:#f0f0f5;"
                        onmouseover="this.style.background='rgba(255,255,255,0.05)'"
                        onmouseout="this.style.background=''"
                        onclick="toggleChangeLog(${index})">
                    <div class="flex items-center gap-3">
                        ${index === 0 ? '<span style="background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;">LATEST</span>' : ''}
                        <span class="font-medium">v${entry.version} — ${entry.date}</span>
                    </div>
                    <span id="toggle-icon-${index}" class="material-icons" style="color:#5c5c72;">expand_more</span>
                </button>
                <div id="changes-${index}" class="px-4 pb-4 hidden">
                    <div class="tkm-divider" style="margin:0 0 12px;"></div>
                    <ul class="space-y-2">
                        ${entry.changes.map(change => `
                            <li class="flex items-start gap-2 text-sm" style="color:#9494a8;">
                                <span class="material-icons" style="font-size:14px;color:#6c63ff;margin-top:2px;flex-shrink:0;">arrow_right</span>
                                ${change}
                            </li>`).join('')}
                    </ul>
                </div>
            </div>
        `).join('');

        function toggleChangeLog(index) {
            const changesDiv = document.getElementById(`changes-${index}`);
            const icon = document.getElementById(`toggle-icon-${index}`);
            if (changesDiv.classList.contains('hidden')) {
                changesDiv.classList.remove('hidden');
                icon.textContent = 'expand_less';
            } else {
                changesDiv.classList.add('hidden');
                icon.textContent = 'expand_more';
            }
        }

        // Auto-open the latest entry
        toggleChangeLog(0);
    </script>

</body>
